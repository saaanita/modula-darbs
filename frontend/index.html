<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catlendar</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            color: #1f2937;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header p {
            color: #6b7280;
            font-size: 15px;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        .form-title {
            font-size: 20px;
            margin-bottom: 16px;
        }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }

        input:focus,
        textarea:focus {
            border-color: #2563eb;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .primary-btn {
            background: #2563eb;
            color: white;
        }

        .primary-btn:hover {
            background: #1d4ed8;
        }

        .danger-btn {
            background: #ef4444;
            color: white;
            padding: 10px 14px;
        }

        .danger-btn:hover {
            background: #dc2626;
        }

        .secondary-btn {
            background: #10b981;
            color: white;
        }

        .secondary-btn:hover {
            background: #059669;
        }

        .groups-header,
        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
        }

        .groups-header h2,
        .tasks-header h2 {
            font-size: 22px;
        }

        .groups-count,
        .tasks-subtitle {
            color: #6b7280;
            font-size: 14px;
        }

        .groups-list,
        .tasks-list {
            display: grid;
            gap: 16px;
        }

        .group-item,
        .task-item {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 18px;
        }

        .group-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .group-item:hover {
            border-color: #93c5fd;
            background: #f8fbff;
        }

        .group-item.active {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .group-content h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .group-content p,
        .task-item p {
            color: #6b7280;
            line-height: 1.5;
            font-size: 14px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .task-text {
            font-size: 15px;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            color: #6b7280;
            padding: 30px 10px;
            border: 2px dashed #d1d5db;
            border-radius: 14px;
            background: #fafafa;
        }

        .status {
            margin-top: 12px;
            font-size: 14px;
            color: #2563eb;
        }

        @media (max-width: 800px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .group-item {
                flex-direction: column;
            }

            .groups-header,
            .tasks-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
