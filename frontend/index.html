<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plānotājs</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            color: #1f2937;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header p {
            color: #6b7280;
            font-size: 15px;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        .form-title {
            font-size: 20px;
            margin-bottom: 16px;
        }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }

        input:focus,
        textarea:focus {
            border-color: #2563eb;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .primary-btn {
            background: #2563eb;
            color: white;
        }

        .primary-btn:hover {
            background: #1d4ed8;
        }

        .danger-btn {
            background: #ef4444;
            color: white;
            padding: 10px 14px;
        }

        .danger-btn:hover {
            background: #dc2626;
        }

        .secondary-btn {
            background: #10b981;
            color: white;
        }

        .secondary-btn:hover {
            background: #059669;
        }

        .groups-header,
        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
        }

        .groups-header h2,
        .tasks-header h2 {
            font-size: 22px;
        }

        .groups-count,
        .tasks-subtitle {
            color: #6b7280;
            font-size: 14px;
        }

        .groups-list,
        .tasks-list {
            display: grid;
            gap: 16px;
        }

        .group-item,
        .task-item {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 18px;
        }

        .group-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .group-item:hover {
            border-color: #93c5fd;
            background: #f8fbff;
        }

        .group-item.active {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .group-content h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .group-content p,
        .task-item p {
            color: #6b7280;
            line-height: 1.5;
            font-size: 14px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .task-text {
            font-size: 15px;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            color: #6b7280;
            padding: 30px 10px;
            border: 2px dashed #d1d5db;
            border-radius: 14px;
            background: #fafafa;
        }

        .status {
            margin-top: 12px;
            font-size: 14px;
            color: #2563eb;
        }

        @media (max-width: 800px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .group-item {
                flex-direction: column;
            }

            .groups-header,
            .tasks-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Mans plānotājs</h1>
            <p>Izveido grupas, izvēlies tās un pievieno uzdevumus.</p>
        </div>

        <div class="layout">
            <div>
                <div class="card">
                    <h2 class="form-title">Izveidot jaunu grupu</h2>

                    <div class="form-grid">
                        <input id="name" type="text" placeholder="Grupas nosaukums" />
                        <textarea id="description" placeholder="Grupas apraksts"></textarea>
                        <button class="primary-btn" onclick="createGroup()">Izveidot grupu</button>
                    </div>

                    <div class="status" id="status"></div>
                </div>

                <div class="card">
                    <div class="groups-header">
                        <div>
                            <h2>Grupu saraksts</h2>
                            <div class="groups-count" id="groups-count">0 grupas</div>
                        </div>
                    </div>

                    <div class="groups-list" id="groups-list"></div>
                </div>
            </div>

            <div>
                <div class="card">
                    <div class="tasks-header">
                        <div>
                            <h2 id="selected-group-title">Izvēlies grupu</h2>
                            <div class="tasks-subtitle" id="selected-group-subtitle">
                                Uzspied uz grupas, lai redzētu tās uzdevumus.
                            </div>
                        </div>
                    </div>

                    <div class="form-grid" style="margin-bottom: 20px;">
                        <input id="task-title" type="text" placeholder="Jaunā uzdevuma nosaukums" />
                        <button class="secondary-btn" onclick="addTask()">Pievienot uzdevumu</button>
                    </div>

                    <div class="tasks-list" id="tasks-list">
                        <div class="empty-state">
                            Vēl nav izvēlēta neviena grupa.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GROUPS_API = "http://127.0.0.1:8000/api/groups";
        const TASKS_API = "http://127.0.0.1:8000/api/tasks";

        let currentGroupId = null;
        let currentGroupName = "";

        async function loadGroups() {
            const list = document.getElementById("groups-list");
            const count = document.getElementById("groups-count");

            try {
                const res = await fetch(GROUPS_API);
                const groups = await res.json();

                list.innerHTML = "";
                count.textContent = `${groups.length} grupas`;

                if (groups.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            Vēl nav nevienas grupas. Izveido pirmo augstāk.
                        </div>
                    `;
                    return;
                }

                groups.forEach(group => {
                    const item = document.createElement("div");
                    item.className = "group-item";

                    if (currentGroupId === group.id) {
                        item.classList.add("active");
                    }

                    item.innerHTML = `
                        <div class="group-content">
                            <h3>${escapeHtml(group.name)}</h3>
                            <p>${escapeHtml(group.description || "Apraksts nav pievienots.")}</p>
                        </div>
                        <button class="danger-btn">Dzēst</button>
                    `;

                    item.addEventListener("click", () => {
                        currentGroupId = group.id;
                        currentGroupName = group.name;
                        updateSelectedGroupUI();
                        loadGroups();
                        loadTasks(group.id);
                    });

                    const deleteBtn = item.querySelector(".danger-btn");
                    deleteBtn.addEventListener("click", async (e) => {
                        e.stopPropagation();
                        await deleteGroup(group.id);
                    });

                    list.appendChild(item);
                });
            } catch (error) {
                list.innerHTML = `
                    <div class="empty-state">
                        Neizdevās ielādēt grupas.
                    </div>
                `;
                count.textContent = "Kļūda";
            }
        }

        async function createGroup() {
            const nameInput = document.getElementById("name");
            const descriptionInput = document.getElementById("description");
            const status = document.getElementById("status");

            const name = nameInput.value.trim();
            const description = descriptionInput.value.trim();

            if (!name) {
                status.textContent = "Lūdzu ievadi grupas nosaukumu.";
                return;
            }

            try {
                const res = await fetch(GROUPS_API, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ name, description })
                });

                if (!res.ok) {
                    throw new Error("Neizdevās izveidot grupu");
                }

                nameInput.value = "";
                descriptionInput.value = "";
                status.textContent = "Grupa veiksmīgi izveidota.";

                loadGroups();
            } catch (error) {
                status.textContent = "Radās kļūda, veidojot grupu.";
            }
        }

        async function deleteGroup(id) {
            if (!confirm("Vai tiešām dzēst šo grupu?")) {
                return;
            }

            try {
                const res = await fetch(`${GROUPS_API}/${id}`, {
                    method: "DELETE"
                });

                if (!res.ok) {
                    throw new Error("Neizdevās dzēst grupu");
                }

                if (currentGroupId === id) {
                    currentGroupId = null;
                    currentGroupName = "";
                    resetTasksUI();
                }

                loadGroups();
            } catch (error) {
                alert("Radās kļūda, dzēšot grupu.");
            }
        }

        async function loadTasks(groupId) {
            const tasksList = document.getElementById("tasks-list");

            try {
                const res = await fetch(`${TASKS_API}?group_id=${groupId}`);
                const tasks = await res.json();

                tasksList.innerHTML = "";

                if (tasks.length === 0) {
                    tasksList.innerHTML = `
                        <div class="empty-state">
                            Šajā grupā vēl nav neviena uzdevuma.
                        </div>
                    `;
                    return;
                }

                tasks.forEach(task => {
                    const item = document.createElement("div");
                    item.className = "task-item";
                    item.innerHTML = `
                        <div class="task-text">${escapeHtml(task.title)}</div>
                    `;
                    tasksList.appendChild(item);
                });
            } catch (error) {
                tasksList.innerHTML = `
                    <div class="empty-state">
                        Neizdevās ielādēt uzdevumus.
                    </div>
                `;
            }
        }

        async function addTask() {
            const taskInput = document.getElementById("task-title");

            if (!currentGroupId) {
                alert("Vispirms izvēlies grupu.");
                return;
            }

            const title = taskInput.value.trim();

            if (!title) {
                alert("Ievadi uzdevuma nosaukumu.");
                return;
            }

            try {
                const res = await fetch(TASKS_API, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        title: title,
                        group_id: currentGroupId
                    })
                });

                if (!res.ok) {
                    throw new Error("Neizdevās pievienot uzdevumu");
                }

                taskInput.value = "";
                loadTasks(currentGroupId);
            } catch (error) {
                alert("Radās kļūda, pievienojot uzdevumu.");
            }
        }

        function updateSelectedGroupUI() {
            document.getElementById("selected-group-title").textContent = currentGroupName;
            document.getElementById("selected-group-subtitle").textContent = "Šīs grupas uzdevumi";
        }

        function resetTasksUI() {
            document.getElementById("selected-group-title").textContent = "Izvēlies grupu";
            document.getElementById("selected-group-subtitle").textContent = "Uzspied uz grupas, lai redzētu tās uzdevumus.";
            document.getElementById("tasks-list").innerHTML = `
                <div class="empty-state">
                    Vēl nav izvēlēta neviena grupa.
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        loadGroups();
    </script>
</body>
</html>
